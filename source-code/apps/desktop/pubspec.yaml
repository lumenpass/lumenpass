name: lumenpass
description: Premium KeePass client (1Password-style UI)
version: 1.0.5+5
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  lumenpass_core:
    path: ../../packages/lumenpass_core
  kdbx: ^2.4.2                    # Official AuthPass KDBX library (KDBX 3 + 4 full support)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  uuid: ^4.5.0
  crypto: ^3.0.5
  otp: ^3.1.3                     # For TOTP
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  flutter_tabler_icons: ^1.43.0
  desktop_drop: ^0.4.4
  tray_manager: ^0.2.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.0
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.0
  dartssh2: ^2.17.1               # Pure-Dart SSH/SFTP client (SFTP provider)
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  flutter_aws_s3_client:
    path: third_party/flutter_aws_s3_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  msix: ^3.16.13

dependency_overrides:
  flutter_secure_storage_windows:
    path: third_party/flutter_secure_storage_windows

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/others/
    - assets/images/categories/
    - assets/images/lock_icons/
    - assets/images/tray_icon.png

msix_config:
  display_name: LumenPass - Password Manager
  publisher_display_name: TranTech Studio
  identity_name: TranTechStudio.LumenPass-PasswordManager
  msix_version: 1.0.5.0
  publisher: CN=E7C3DEED-03E7-4777-AC12-FDEB611FA59C
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient
  store: true
  startup_task:
    task_id: LumenPassStartup
    enabled: true
    parameters: --autostart
